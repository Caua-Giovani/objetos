<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Consulta de CEP</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      background-color: #ffffff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      text-align: center;
      display: flex;
      justify-content: center;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    h1 {
      font-size: 24px;
      font-weight: bold;
      color: #000;
    }

    input {
      width: 160px;
      padding: 6px;
      border: 1px solid #999;
      border-radius: 2px;
      text-align: center;
    }

    .buttons {
      display: flex;
      justify-content: center;
      gap: 10px;
    }

    button {
      background-color: #333;
      color: #fff;
      border: none;
      padding: 6px 12px;
      font-size: 12px;
      border-radius: 3px;
      cursor: pointer;
    }

    button:hover {
      background-color: #555;
    }
  </style>
  <script src= "./script.js" defer></script>
</head>
<body>

  <div class="container">
    <h1>Consulta de CEP</h1>

    <input class="input_cep" type="text" value="">

    <div class="buttons">
      <button class="btn_then">Buscar com .then()</button>
      <button class="btn_await">Buscar com async/await</button>
    </div>
  </div>

</body>
</html>
